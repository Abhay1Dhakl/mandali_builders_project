services:
  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    container_name: mandali-builders-backend
    ports:
      - "8000:8000"

  frontend:
    build:
      context: .
      dockerfile: frontend/Dockerfile
    container_name: mandali-builders-frontend
    depends_on:
      - backend
    environment:
      API_BASE_URL: http://backend:8000
      NEXT_PUBLIC_API_BASE_URL: http://127.0.0.1:8000
    ports:
      - "3000:3000"
